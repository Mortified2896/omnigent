          hook_replacement = r'''/**
 * Session-scoped task-run registry for inline outcome cards. The list is
 * fetched once on session load and once when a streaming turn reaches idle;
 * individual historical bubbles never start their own registry requests.
 */
export function useTaskOutcomeRuns(
  sessionId: string | null | undefined,
  streamStatus: "idle" | "streaming",
): readonly TaskRunSummary[] {
  const [registry, setRegistry] = useState<{
    sessionId: string | null;
    runs: readonly TaskRunSummary[];
  }>({ sessionId: null, runs: EMPTY_TASK_OUTCOME_RUNS });
  const statusRef = useRef(streamStatus);
  const statusSessionRef = useRef(sessionId ?? null);

  const load = (activeSessionId: string, signal: AbortSignal) =>
    listSessionTaskRuns(activeSessionId, 200, signal).then(({ runs }) => {
      if (!signal.aborted) setRegistry({ sessionId: activeSessionId, runs });
    });

  useEffect(() => {
    const controller = new AbortController();
    if (!sessionId) {
      setRegistry({ sessionId: null, runs: EMPTY_TASK_OUTCOME_RUNS });
      return () => controller.abort();
    }
    setRegistry({ sessionId, runs: EMPTY_TASK_OUTCOME_RUNS });
    void load(sessionId, controller.signal).catch((error) => {
      if (!controller.signal.aborted) console.warn("Failed to load task outcome registry", error);
    });
    return () => controller.abort();
  }, [sessionId]);

  useEffect(() => {
    const sessionChanged = statusSessionRef.current !== (sessionId ?? null);
    statusSessionRef.current = sessionId ?? null;
    const wasStreaming = statusRef.current === "streaming";
    statusRef.current = streamStatus;
    if (sessionChanged || !sessionId || !wasStreaming || streamStatus !== "idle") return;
    const controller = new AbortController();
    void load(sessionId, controller.signal).catch((error) => {
      if (!controller.signal.aborted)
        console.warn("Failed to refresh task outcome registry", error);
    });
    return () => controller.abort();
  }, [sessionId, streamStatus]);

  return registry.sessionId === sessionId ? registry.runs : EMPTY_TASK_OUTCOME_RUNS;
}

/** Backwards-compatible exact-id view for non-transcript consumers. */
export function useTaskOutcomeResponseIds(
  sessionId: string | null | undefined,
  streamStatus: "idle" | "streaming",
): ReadonlySet<string> {
  const runs = useTaskOutcomeRuns(sessionId, streamStatus);
  return useMemo(
    () => new Set(runs.flatMap((run) => (run.response_id ? [run.response_id] : []))),
    [runs],
  );
}

const EMPTY_TASK_OUTCOME_RUNS: readonly TaskRunSummary[] = Object.freeze([]);
