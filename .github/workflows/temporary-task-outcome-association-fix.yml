              '''          data-testid="assistant-outcome-slot"
          data-response-id={bubble.responseId}
          data-task-run-response-id={outcomeResponseId}
          className="max-w-3xl"
        >
          <TaskOutcomeBriefCard
            sessionId={outcomeSessionId ?? ""}
