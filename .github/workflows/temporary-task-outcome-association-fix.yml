              "TaskRunSummary triggering_message_id",
          )

          anchor_code = r'''
/**
 * Map each completed assistant bubble to the persisted task-run response id
 * whose outcome card it owns.
 *
 * Normal Responses-style sessions use the same response id in the transcript
 * and task_run row, so the direct match is authoritative. Native OpenCode is
 * different by design: its forwarder groups transcript items under the
 * OpenCode assistant message id (msg_*), while the task recorder tracks the
 * Omnigent relay response id (resp_*). For that case, the persisted
 * triggering_message_id is the stable bridge: find that exact user bubble and
 * anchor the run to the final completed assistant result before the next user
 * turn. No latest-response, timing, or polling-order heuristic is used.
 *
 * The returned map is keyed by Bubble.stableId (the rendered bubble identity)
 * and stores the real task_run.response_id used by the by-response endpoint.
 */
export function resolveTaskOutcomeAnchors(
  bubbles: readonly Bubble[],
  runs: readonly TaskRunSummary[],
): ReadonlyMap<string, string> {
  const anchors = new Map<string, string>();
  const claimedBubbleIds = new Set<string>();
  const unresolved: TaskRunSummary[] = [];

  const isResultBubble = (
    bubble: Bubble | undefined,
  ): bubble is Extract<Bubble, { kind: "assistant" }> =>
    bubble?.kind === "assistant" &&
    bubble.lifecycle === "completed" &&
    bubble.items.some((item) => item.kind !== "elicitation");

  // First preserve the ordinary, exact response-id contract. Walk from the
  // end so a reconnect duplicate resolves to the canonical final occurrence.
  for (const run of runs) {
    if (!run.response_id || run.terminal_status === "running") continue;
    let match: Extract<Bubble, { kind: "assistant" }> | undefined;
    for (let index = bubbles.length - 1; index >= 0; index -= 1) {
      const bubble = bubbles[index];
      if (isResultBubble(bubble) && bubble.responseId === run.response_id) {
        match = bubble;
        break;
      }
    }
    if (match && !claimedBubbleIds.has(match.stableId)) {
      anchors.set(match.stableId, run.response_id);
      claimedBubbleIds.add(match.stableId);
    } else if (!match) {
      unresolved.push(run);
    }
  }

  // Native transcript ids can differ from task-run response ids. Resolve only
  // through the persisted triggering user item; without that exact identity we
  // fail closed rather than attaching an outcome to a nearby/latest response.
  for (const run of unresolved) {
    if (!run.response_id || !run.triggering_message_id) continue;
    const userIndex = bubbles.findIndex(
      (bubble) => bubble.kind === "user" && bubble.itemId === run.triggering_message_id,
    );
    if (userIndex < 0) continue;

    let turnEnd = bubbles.length;
    for (let index = userIndex + 1; index < bubbles.length; index += 1) {
      if (bubbles[index]?.kind === "user") {
        turnEnd = index;
        break;
      }
    }

    for (let index = turnEnd - 1; index > userIndex; index -= 1) {
      const bubble = bubbles[index];
      if (!isResultBubble(bubble) || claimedBubbleIds.has(bubble.stableId)) continue;
      anchors.set(bubble.stableId, run.response_id);
      claimedBubbleIds.add(bubble.stableId);
      break;
    }
  }

  return anchors;
}
'''.strip("\n")

