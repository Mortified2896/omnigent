          anchor_test = r'''import { describe, expect, it } from "vitest";
import type { Bubble } from "./renderItems";
import {
  resolveTaskOutcomeAnchors,
  type TaskRunSummary,
} from "./taskOutcomes";

function user(itemId: string, text = "prompt"): Extract<Bubble, { kind: "user" }> {
  return { kind: "user", itemId, content: [{ type: "input_text", text }] };
}

function assistant(
  responseId: string,
  stableId = responseId,
  text = "result",
): Extract<Bubble, { kind: "assistant" }> {
  return {
    kind: "assistant",
    responseId,
    stableId,
    lifecycle: "completed",
    error: null,
    items: [{ kind: "text", itemId: `${stableId}:text`, text, final: true }],
  };
}

function run(overrides: Partial<TaskRunSummary>): TaskRunSummary {
  return {
    id: "run_1",
    conversation_id: "conv_1",
    response_id: "resp_1",
    triggering_message_id: "msg_user_1",
    terminal_status: "completed",
    started_at: null,
    terminal_at: null,
    duration_ms: null,
    selected_provider: null,
    selected_model: null,
    requested_route_id: null,
    fallback_used: null,
    harness_id: null,
    proposed_task_family: null,
    input_tokens: null,
    output_tokens: null,
    total_cost_usd: null,
    commit_sha: null,
    changed_files_count: null,
    failure_error_code: null,
    langfuse_trace_id: null,
    created_at: 0,
    updated_at: 0,
    ...overrides,
  };
}

describe("resolveTaskOutcomeAnchors", () => {
  it("keeps the ordinary exact response-id association", () => {
    const bubbles: Bubble[] = [user("msg_user_1"), assistant("resp_1")];
    expect(resolveTaskOutcomeAnchors(bubbles, [run({})]).get("resp_1")).toBe("resp_1");
  });

  it("bridges OpenCode msg_* transcript ids to the persisted resp_* task run", () => {
    const bubbles: Bubble[] = [
      user("msg_user_1", "Hi"),
      assistant("msg_opencode_assistant_1", "bubble_1", "Hello"),
    ];
    const anchors = resolveTaskOutcomeAnchors(bubbles, [
      run({
        response_id: "resp_omni_1",
        triggering_message_id: "msg_user_1",
        harness_id: "opencode-native",
      }),
    ]);
    expect(anchors.get("bubble_1")).toBe("resp_omni_1");
    expect(anchors.has("resp_omni_1")).toBe(false);
  });

  it("anchors to the final completed result in the triggering user turn", () => {
    const bubbles: Bubble[] = [
      user("msg_user_1"),
      { ...assistant("msg_intermediate", "intermediate"), items: [] },
      assistant("msg_final", "final"),
      user("msg_user_2"),
      assistant("msg_next", "next"),
    ];
    const anchors = resolveTaskOutcomeAnchors(bubbles, [
      run({ response_id: "resp_omni_1", triggering_message_id: "msg_user_1" }),
    ]);
    expect(anchors.get("final")).toBe("resp_omni_1");
    expect(anchors.has("next")).toBe(false);
  });

  it("keeps two reversed task-run results attached to their own user turns", () => {
    const bubbles: Bubble[] = [
      user("msg_user_1"),
      assistant("msg_assistant_1", "bubble_1"),
      user("msg_user_2"),
      assistant("msg_assistant_2", "bubble_2"),
    ];
    const anchors = resolveTaskOutcomeAnchors(bubbles, [
      run({ id: "run_2", response_id: "resp_2", triggering_message_id: "msg_user_2" }),
      run({ id: "run_1", response_id: "resp_1", triggering_message_id: "msg_user_1" }),
    ]);
    expect(anchors.get("bubble_1")).toBe("resp_1");
    expect(anchors.get("bubble_2")).toBe("resp_2");
  });

  it("fails closed when neither response id nor triggering message identity matches", () => {
    const bubbles: Bubble[] = [user("another_user"), assistant("msg_assistant", "bubble")];
    const anchors = resolveTaskOutcomeAnchors(bubbles, [
      run({ response_id: "resp_unknown", triggering_message_id: "msg_missing" }),
    ]);
    expect(anchors.size).toBe(0);
  });
});
'''
